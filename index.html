// 📊 ANALYTICS PAGE — Charts & Graphs
// ═══════════════════════════════════════════════════════════════════
function AnalyticsPage() {
  const { useEffect, useRef } = React;
  const attChartRef  = useRef(null);
  const marksChartRef = useRef(null);
  const branchChartRef = useRef(null);
  const trendChartRef = useRef(null);
  const charts = useRef({});

  useEffect(() => {
    // Destroy old charts
    Object.values(charts.current).forEach(c => { try { c.destroy(); } catch(e){} });
    charts.current = {};

    // Chart 1: Attendance by Subject
    if (attChartRef.current) {
      charts.current.att = new Chart(attChartRef.current, {
        type: 'bar',
        data: {
          labels: ['Data Structures','Algorithms','DBMS','Computer Networks','OS'],
          datasets: [{
            label: 'Attendance %',
            data: [84, 83, 92, 68, 89],
            backgroundColor: ['#3b82f6','#7c3aed','#16a34a','#dc2626','#d97706'],
            borderRadius: 6,
          }]
        },
        options: { responsive:true, plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true, max:100 } } }
      });
    }

    // Chart 2: Marks Distribution
    if (marksChartRef.current) {
      charts.current.marks = new Chart(marksChartRef.current, {
        type: 'doughnut',
        data: {
          labels: ['A+ (80-100)','A (70-79)','B (50-69)','C (40-49)','F (<40)'],
          datasets: [{
            data: [12, 28, 35, 15, 10],
            backgroundColor: ['#16a34a','#2563eb','#d97706','#7c3aed','#dc2626'],
          }]
        },
        options: { responsive:true, plugins:{ legend:{ position:'bottom' } } }
      });
    }

    // Chart 3: Branch-wise Students
    if (branchChartRef.current) {
      charts.current.branch = new Chart(branchChartRef.current, {
        type: 'bar',
        data: {
          labels: ['CS','IT','ME','CE','EE','EC'],
          datasets: [{
            label: 'Students',
            data: [320, 280, 220, 180, 140, 160],
            backgroundColor: '#2563eb',
            borderRadius: 6,
          }]
        },
        options: { responsive:true, plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true } } }
      });
    }

    // Chart 4: Monthly Attendance Trend
    if (trendChartRef.current) {
      charts.current.trend = new Chart(trendChartRef.current, {
        type: 'line',
        data: {
          labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
          datasets: [{
            label: 'Avg Attendance %',
            data: [82,79,85,88,76,0,0,80,84,87,83,85],
            borderColor: '#2563eb',
            backgroundColor: 'rgba(37,99,235,0.1)',
            tension: 0.4,
            fill: true,
          }]
        },
        options: { responsive:true, plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:false, min:60, max:100 } } }
      });
    }

    return () => { Object.values(charts.current).forEach(c => { try { c.destroy(); } catch(e){} }); };
  }, []);

  return (
    <div>
      {/* Stats */}
      <div className="stats-grid" style={{marginBottom:24}}>
        {[
          {label:'Total Students',  value:'1,240', badge:'badge-blue',   sub:'All branches'},
          {label:'Avg Attendance',  value:'78%',   badge:'badge-green',  sub:'This semester'},
          {label:'Pass Rate',       value:'91%',   badge:'badge-purple', sub:'Last exam'},
          {label:'Fee Collection',  value:'87%',   badge:'badge-amber',  sub:'This year'},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub"><span className={"stat-badge "+s.badge}>{s.sub}</span></div>
          </div>
        ))}

];

function FeeMgmtPage() {
  const [fees, setFees]         = useState(FEE_DATA_INIT);
  const [search, setSearch]     = useState('');
  const [filter, setFilter]     = useState('all');
  const [modal, setModal]       = useState(null);
  const [selected, setSelected] = useState(null);
  const [payAmt, setPayAmt]     = useState('');
  const [toast, setToast]       = useState('');
  const [emailStatus, setEmailStatus] = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const totalFee     = fees.reduce((a,b)=>a+b.total,0);
  const totalPaid    = fees.reduce((a,b)=>a+b.paid,0);
  const totalDue     = fees.reduce((a,b)=>a+b.due,0);
  const paidCount    = fees.filter(f=>f.status==='paid').length;
  const overdueCount = fees.filter(f=>f.status==='overdue').length;

  const filtered = fees.filter(f => {
    const matchSearch = f.name.toLowerCase().includes(search.toLowerCase()) || f.rollNo.toLowerCase().includes(search.toLowerCase());
    const matchFilter = filter==='all' || f.status===filter;
    return matchSearch && matchFilter;
  });

  const recordPayment = () => {
    if (!payAmt || isNaN(payAmt)) return alert('Valid amount dalo!');
    const amount = parseInt(payAmt);
    setFees(prev => prev.map(f => {
      if (f.id !== selected.id) return f;
      const newPaid = Math.min(f.paid + amount, f.total);
      const newDue  = f.total - newPaid;
      const newStatus = newDue === 0 ? 'paid' : newPaid > 0 ? 'partial' : 'unpaid';
      return { ...f, paid: newPaid, due: newDue, status: newStatus };
    }));
    showToast('✅ Payment recorded — Rs.' + amount.toLocaleString());
    setModal(null); setPayAmt('');
  };

  const sendReminder = (student) => {
    setEmailStatus('sending');
    setTimeout(() => {
      setEmailStatus('');
      showToast('📧 Reminder email bhej diya — ' + student.name + ' ko!');
    }, 1500);
  };

  const statusColor = {
    paid:    {bg:'var(--green-bg)',  color:'var(--green)',  label:'✅ Paid'},
    partial: {bg:'var(--amber-bg)', color:'var(--amber)', label:'⚡ Partial'},
    unpaid:  {bg:'var(--red-bg)',   color:'var(--red)',   label:'❌ Unpaid'},
    overdue: {bg:'var(--red-bg)',   color:'var(--red)',   label:'⚠️ Overdue'},
  };

  return (
    <div>
      {toast && (
        <div style={{position:'fixed',top:20,right:20,zIndex:999,background:'var(--text)',color:'var(--surface)',
          padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,boxShadow:'0 4px 16px rgba(0,0,0,0.18)'}}>
          {toast}
        </div>
      )}

      {/* Stats */}
      <div className="stats-grid" style={{marginBottom:20}}>
        <div className="stat-card">
          <div className="stat-label">Total Fee</div>
          <div className="stat-value" style={{fontSize:22}}>{'Rs.'+totalFee.toLocaleString()}</div>
          <div className="stat-sub" style={{color:'var(--text3)'}}>This semester</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Collected</div>
          <div className="stat-value" style={{fontSize:22,color:'var(--green)'}}>{'Rs.'+totalPaid.toLocaleString()}</div>
          <div className="stat-sub"><span className="stat-badge badge-green">{Math.round(totalPaid/totalFee*100)}% collected</span></div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Pending</div>
          <div className="stat-value" style={{fontSize:22,color:'var(--red)'}}>{'Rs.'+totalDue.toLocaleString()}</div>
          <div className="stat-sub"><span className="stat-badge badge-red">{overdueCount} overdue</span></div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Fully Paid</div>
          <div className="stat-value" style={{color:'var(--green)'}}>{paidCount}</div>
          <div className="stat-sub"><span className="stat-badge badge-green">out of {fees.length}</span></div>
        </div>
      </div>

      {/* Filter + Search */}
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',opacity:0.4}}><Icon name="search" size={14}/></div>
          <input className="form-input" style={{paddingLeft:34}} placeholder="Student naam ya roll no..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="form-input" style={{width:160}} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All Students</option>
          <option value="paid">Paid</option>
          <option value="partial">Partial</option>
          <option value="unpaid">Unpaid</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>

      {/* Table */}
      <div className="card">
        <div className="card-header">
          <div className="card-title">Fee Records</div>
          <span className="chip badge-blue">{filtered.length} students</span>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr><th>Student</th><th>Branch</th><th>Total Fee</th><th>Paid</th><th>Due</th><th>Due Date</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(f => {
                const s = statusColor[f.status] || statusColor.unpaid;
                return (
                  <tr key={f.id}>
                    <td>
                      <div style={{fontWeight:500}}>{f.name}</div>
                      <div style={{fontSize:12,color:'var(--text3)',fontFamily:'DM Mono'}}>{f.rollNo}</div>
                    </td>
                    <td><span className="chip badge-blue">{f.branch}</span></td>
                    <td style={{fontFamily:'DM Mono'}}>{'Rs.'+f.total.toLocaleString()}</td>
                    <td style={{fontFamily:'DM Mono',color:'var(--green)',fontWeight:600}}>{'Rs.'+f.paid.toLocaleString()}</td>
                    <td style={{fontFamily:'DM Mono',color:f.due>0?'var(--red)':'var(--text3)',fontWeight:f.due>0?600:400}}>
                      {f.due>0?'Rs.'+f.due.toLocaleString():'—'}
                    </td>
                    <td style={{fontSize:13}}>{f.dueDate}</td>
                    <td><span className="chip" style={{background:s.bg,color:s.color}}>{s.label}</span></td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        {f.due > 0 && (
                          <button className="btn btn-primary btn-sm" onClick={()=>{setSelected(f);setModal('pay');}}>
                            💰 Pay
                          </button>
                        )}
                        <button className="btn btn-secondary btn-sm" onClick={()=>sendReminder(f)} title="Send Email Reminder">
                          📧
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Payment Modal */}
      {modal==='pay' && selected && (
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" style={{width:400}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div className="modal-title" style={{margin:0}}>💰 Payment Record Karo</div>
              <button onClick={()=>setModal(null)} style={{border:'none',background:'none',cursor:'pointer'}}><Icon name="close" size={18}/></button>
            </div>
            <div style={{background:'var(--bg)',borderRadius:9,padding:'14px 16px',marginBottom:16}}>
              <div style={{fontWeight:600,marginBottom:4}}>{selected.name}</div>
              <div style={{fontSize:13,color:'var(--text3)'}}>{selected.rollNo} · {selected.branch}</div>
              <div style={{display:'flex',gap:20,marginTop:10,fontSize:13}}>
                <div><div style={{color:'var(--text3)'}}>Total</div><div style={{fontWeight:600}}>Rs.{selected.total.toLocaleString()}</div></div>
                <div><div style={{color:'var(--text3)'}}>Paid</div><div style={{fontWeight:600,color:'var(--green)'}}>Rs.{selected.paid.toLocaleString()}</div></div>
                <div><div style={{color:'var(--text3)'}}>Due</div><div style={{fontWeight:600,color:'var(--red)'}}>Rs.{selected.due.toLocaleString()}</div></div>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Amount (Rs.) *</label>
              <input className="form-input" type="number" placeholder={'Max: Rs.'+selected.due.toLocaleString()} value={payAmt} onChange={e=>setPayAmt(e.target.value)}/>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={recordPayment}>✅ Record Payment</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

              <div>
                <label className="form-label">Date *</label>
                <input type="date" className="form-input" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
              </div>
              <div>
                <label className="form-label">Time</label>
                <input className="form-input" placeholder="10:00 AM" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))}/>
              </div>
              <div>
                <label className="form-label">Room / Hall</label>
                <select className="form-input" value={form.room} onChange={e=>setForm(p=>({...p,room:e.target.value}))}>
                  {['Hall A','Hall B','Hall C','Hall D','Lab 1','Lab 2'].map(r=><option key={r}>{r}</option>)}
                </select>
              </div>
              <div>
                <label className="form-label">Exam Type</label>
                <select className="form-input" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
                  <option>Mid Sem</option><option>End Sem</option><option>Unit Test</option><option>Practical</option>
                </select>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addExam}>📅 Add Exam</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// 🔔 PUSH NOTIFICATIONS — Global Toast System
// ═══════════════════════════════════════════════════════════════════
function usePushNotifications() {
  const [permission, setPermission] = useState('default');
  const [notifs, setNotifs]         = useState([
    {id:1, title:'📅 Exam Alert!',       body:'Data Structures exam kal hai — 10 April!', time:'Just now', read:false},
    {id:2, title:'⚠️ Attendance Warning', body:'Computer Networks mein attendance 68% hai', time:'2h ago',  read:false},
    {id:3, title:'💰 Fee Reminder',       body:'Fee due date 31 March hai — Rs.25,000 baaki', time:'1d ago', read:true},
    {id:4, title:'📊 Result Published',   body:'Mid sem result declare ho gaya!',            time:'2d ago', read:true},
  ]);

  const requestPermission = () => {
    if ('Notification' in window) {
      Notification.requestPermission().then(p => {
        setPermission(p);
        if (p === 'granted') {
          new Notification('EduERP', { body: 'Notifications ON ho gayi hain! 🎉' });
        }
      });
    }
  };

  const markRead = (id) => setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
  const markAllRead = () => setNotifs(p=>p.map(n=>({...n,read:true})));
  const unreadCount = notifs.filter(n=>!n.read).length;

  return { permission, requestPermission, notifs, markRead, markAllRead, unreadCount };
}


// ─── App Shell ────────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard:'Dashboard', attendance:'My Attendance', marks:'My Marks', timetable:'Timetable',
  notifications:'Notifications', 'class-attendance':'Class Attendance', 'marks-entry':'Marks Entry',
  students:'All Students', teachers:'All Teachers', reports:'Reports & Analytics', settings:'System Settings',
  branches:'Branch Management', 'fee-mgmt':'Fee Management', fee:'My Fee Details',
  'exam-schedule':'Exam Schedule', analytics:'Analytics & Charts',
};

function App() {
  const [user, setUser] = useState(null);
  const [activeView, setActiveView] = useState('dashboard');
  const token = user?.token || localStorage.getItem('erp_token') || '';

  const renderContent = () => {
    if (!user) return null;
    if (user.role === 'student') {
      const views = { dashboard:<StudentDashboard user={user}/>, attendance:<AttendancePage/>, marks:<MarksPage/>, timetable:<TimetablePage/>, notifications:<NotificationsPage/>, 'exam-schedule':<ExamSchedulePage/>, fee:<FeeDetailsPage user={user}/> };
      return views[activeView] || <StudentDashboard user={user}/>;
    }
    if (user.role === 'teacher') {
      const views = { dashboard:<TeacherDashboard user={user}/>, 'class-attendance':<ClassAttendancePage/>, 'marks-entry':<MarksEntryPage/>, timetable:<TimetablePage/>, notifications:<NotificationsPage/>, 'exam-schedule':<ExamSchedulePage/> };
      return views[activeView] || <TeacherDashboard user={user}/>;
    }
    if (user.role === 'admin') {
      const views = { dashboard:<AdminDashboard/>, branches:<BranchManagementPage/>, students:<StudentsPage token={token}/>, teachers:<TeachersPage/>, reports:<ReportsPage/>, settings:<SettingsPage user={user}/>, 'fee-mgmt':<FeeMgmtPage/>, 'exam-schedule':<ExamSchedulePage/>, analytics:<AnalyticsPage/> };
      return views[activeView] || <AdminDashboard/>;
    }
  };

  if (!user) return <LoginScreen onLogin={(u)=>{setUser(u);setActiveView('dashboard');}}/>;

  const [sidebarOpen, setSidebarOpen] = useState(false);
  return (
    <div className="app-layout">
      {/* Mobile overlay */}
      {sidebarOpen && <div className="mobile-overlay" onClick={()=>setSidebarOpen(false)}/>}
      <Sidebar user={user} activeView={activeView} setActiveView={(v)=>{setActiveView(v);setSidebarOpen(false);}} onLogout={()=>{setUser(null);setActiveView('dashboard');localStorage.removeItem('erp_token');}} isOpen={sidebarOpen}/>
      <div className="main-content">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button className="mobile-menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div className="page-title">{PAGE_TITLES[activeView]||'Dashboard'}</div>
          </div>
          <div className="topbar-right">
            <div className="topbar-date" style={{fontSize:13,color:'var(--text3)'}}>
              {new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
            </div>
            <button className="badge-btn" onClick={()=>setActiveView('notifications')}>
              <Icon name="bell" size={16}/>
              <div className="badge"/>
            </button>
            <div className="avatar" style={{width:34,height:34,background:user.role==='student'?'var(--accent-bg)':user.role==='teacher'?'var(--purple-bg)':'var(--green-bg)',color:user.role==='student'?'var(--accent)':user.role==='teacher'?'var(--purple)':'var(--green)',fontSize:13,cursor:'default'}}>
              {user.name.split(' ').map(n=>n[0]).join('').slice(0,2)}
            </div>
          </div>
        </div>
        <div className="content-area">
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
